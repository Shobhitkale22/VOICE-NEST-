<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceNest</title>
     
    <link rel="stylesheet" href="./css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Header -->
    <header>

        <div class="logo">
            <i class="fa-solid fa-microphone-lines"></i>
        </div>

        <h1>VoiceNest</h1>

        <p>Secure Voice Recorder</p>

    </header>

    <!-- Menu -->

    <div class="menu">

        <!-- Card 1 -->

        <div class="card" id="startRecording">

            <div class="left">

                <div class="icon purple">
                    <i class="fa-solid fa-microphone"></i>
                </div>

                <div class="content">
                    <h2>Start Recording</h2>
                    <p>Tap to start a new voice recording</p>
                </div>

            </div>

            <div class="arrow">
                <i class="fa-solid fa-angle-right"></i>
            </div>

        </div>

        <!-- Card 2 -->

        <div class="card" id="myRecordings">

            <div class="left">

                <div class="icon yellow">
                    <i class="fa-solid fa-folder"></i>
                </div>

                <div class="content">
                    <h2>My Recordings</h2>
                    <p>View and manage your recordings</p>
                </div>

            </div>

            <div class="arrow">
                <i class="fa-solid fa-angle-right"></i>
            </div>

        </div>

        <!-- Card 3 -->

        <div class="card" id="cloud">

            <div class="left">

                <div class="icon blue">
                    <i class="fa-solid fa-cloud"></i>
                </div>

                <div class="content">
                    <h2>Cloud</h2>
                    <p>Upload, backup and share securely</p>
                </div>

            </div>

            <div class="arrow">
                <i class="fa-solid fa-angle-right"></i>
            </div>

        </div>

        <!-- Card 4 -->

        <div class="card" id="settings">

            <div class="left">

                <div class="icon green">
                    <i class="fa-solid fa-gear"></i>
                </div>

                <div class="content">
                    <h2>Settings</h2>
                    <p>App preferences and security</p>
                </div>

            </div>

            <div class="arrow">
                <i class="fa-solid fa-angle-right"></i>
            </div>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <div class="footer-icon">
            <i class="fa-solid fa-lock"></i>
        </div>

        <div class="footer-text">
            <h3>Your voice. Your privacy.</h3>
            <p>Encrypted • Secure • Private</p>
        </div>

    </footer>

</div>
<script src="js/home.js"></script>
</body>
</html>
