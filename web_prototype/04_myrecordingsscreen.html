<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VoiceNest | My Recordings</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <div class="logo">

            <i class="fa-solid fa-folder-open"></i>

        </div>

        <h1>VoiceNest</h1>

        <p>My Recordings</p>

    </header>

    <!-- Search -->

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            placeholder="Search recordings...">

    </div>

    <!-- Recording 1 -->

    <div class="card recording-card">

        <div class="left">

            <div class="icon purple">

                <i class="fa-solid fa-microphone-lines"></i>

            </div>

            <div class="content">

                <h2>Project Discussion</h2>

                <p>
                    <i class="fa-solid fa-lock"></i>
                    Encrypted
                </p>

                <small>Today • 00:45</small>

            </div>

        </div>

        <div class="arrow">

            <i class="fa-solid fa-chevron-right"></i>

        </div>

    </div>

    <!-- Recording 2 -->

    <div class="card recording-card">

        <div class="left">

            <div class="icon blue">

                <i class="fa-solid fa-microphone-lines"></i>

            </div>

            <div class="content">

                <h2>Meeting with Founder</h2>

                <p>
                    <i class="fa-solid fa-lock"></i>
                    Encrypted
                </p>

                <small>Yesterday • 01:32</small>

            </div>

        </div>

        <div class="arrow">

            <i class="fa-solid fa-chevron-right"></i>

        </div>

    </div>

    <!-- Recording 3 -->

    <div class="card recording-card">

        <div class="left">

            <div class="icon yellow">

                <i class="fa-solid fa-microphone-lines"></i>

            </div>

            <div class="content">

                <h2>College Notes</h2>

                <p>
                    <i class="fa-solid fa-lock"></i>
                    Encrypted
                </p>

                <small>5 Jul • 00:58</small>

            </div>

        </div>

        <div class="arrow">

            <i class="fa-solid fa-chevron-right"></i>

        </div>

    </div>

    <!-- New Recording -->

    <button class="action-btn pause-btn">

        <i class="fa-solid fa-plus"></i>

        New Recording

    </button>

</div>

</body>

</html>
